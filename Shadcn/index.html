<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The AI-Native shadcn</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="assets/shadcn-logo.svg" type="image/svg+xml">
</head>
<body>

    <header class="nav-bar">
        <nav class="nav-container">

            <div class="nav-left">

                <a href="https://www.shadcn.com" target="_blank" class="brand">
                    <img src="assets/shadcn-logo.svg" alt="shadcn logo">
                    <span>shadcn.io</span>
                </a>

                <ul class="nav-menu">
                    <li><a href="#" target="_blank">Templates</a></li>
                    <li><a href="#" target="_blank">Blocks</a></li>
                    <li><a href="#" target="_blank">MCP</a></li>
                    <li><a href="#" target="_blank">Browse</a></li>
                    <li><a href="#" target="_blank">Pricing</a></li>
                </ul>

            </div>

            <div class="nav-right">

                <div class="search-box">

                    <label for="search" class="visually-hidden">
                        Search
                    </label>

                    <img
                        src="assets/search.png"
                        alt=""
                        class="search-icon"
                    >

                    <input
                        id="search"
                        type="text"
                        placeholder="Search"
                    >

                    <kbd class="shortcut">Win + K</kbd>

                </div>

                <button
                    type="button"
                    class="theme-toggle"
                    aria-label="Toggle theme">
                    #
                </button>

                <a href="#" target="_blank" aria-label="GitHub">
                    <img src="assets/github.png" alt="GitHub">
                </a>

                <a href="#" target="_blank" aria-label="Discord">
                    <img src="assets/discord.png" alt="Discord">
                </a>

            </div>

        </nav>
    </header>

</body>
</html>
